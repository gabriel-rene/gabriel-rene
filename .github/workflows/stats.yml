name: Update stats

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths: [scripts/generate-stats.mjs, .github/workflows/stats.yml]

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate stats SVGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- assets; then
            echo "No change to stats."
            exit 0
          fi
          git add assets/stats-light.svg assets/stats-dark.svg
          git commit -m "Update contribution stats"
          git push
